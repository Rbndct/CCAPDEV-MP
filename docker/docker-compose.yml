version: '3.8'

services:
  frontend:
    build:
      context: ../client
      dockerfile: ../docker/Dockerfile.dev
    container_name: court-reservation-frontend
    ports:
      - "5173:5173"
    volumes:
      - ../client:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - DOCKER=true
    stdin_open: true
    tty: true
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: court-reservation-backend
    volumes:
      - ../backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
    dns:
      - 8.8.8.8

  # Optional: local mongo for development/testing without Atlas
  mongo:
    image: mongo:latest
    container_name: court-reservation-mongo
    command: ["--quiet"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    container_name: court-reservation-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
    depends_on:
      - mongo

volumes:
  mongo-data:
